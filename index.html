<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issue Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN PAGE -->
<section id="loginPage" class="login-section">
    <div class="login-box">
        <img src="assets/github-logo.png" class="login-logo">
        <h2>GitHub Issues Tracker</h2>
        <p class="subtitle">Sign in to manage your issues</p>
        <input id="username" type="text" placeholder="Enter Username">
        <input id="password" type="password" placeholder="Enter Password">
        <button onclick="login()" class="login-btn">Sign In</button>
        <div class="demo-box">
            <p><b>Demo Credentials</b></p>
            <p>Username: admin</p>
            <p>Password: admin123</p>
        </div>
    </div>
</section>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
    <nav class="navbar">
        <div class="nav-left">
            <img src="assets/github-logo.png">
            <h3>GitHub Issues Tracker</h3>
        </div>
        <div class="nav-right">
            <input id="searchInput" type="text" placeholder="Search issues...">
            <button class="new-btn">+ New Issue</button>
        </div>
    </nav>

    <section class="issue-section">
        <div class="tabs">
            <button class="active">All</button>
            <button>Open</button>
            <button>Closed</button>
        </div>

        <div id="loader" class="loader"></div>

        <div id="issueContainer" class="issue-grid"></div>
    </section>
</div>

<!-- MODAL -->
<div id="issueModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>
        <p><b>Author:</b> <span id="modalAuthor"></span></p>
        <p><b>Priority:</b> <span id="modalPriority"></span></p>
        <p><b>Status:</b> <span id="modalStatus"></span></p>
        <p><b>Created:</b> <span id="modalDate"></span></p>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
